name: 'Release Automation'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    env:
      OPENSSL_STATIC: "1"
      LIBSSH2_SYS_USE_PKG_CONFIG: "1"
      ZLIB_STATIC: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          cd app && npm install
          cd ../web && npm install
          cd ../backend && npm install

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libwebkit2gtk-4.1-0 \
            libgtk-3-0 \
            libayatana-appindicator3-1

      - name: Install dependencies (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install dependencies (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          vcpkg install openssl:x64-windows zlib:x64-windows libssh2:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          echo "OPENSSL_DIR=$env:VCPKG_ROOT/installed/x64-windows" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$env:VCPKG_ROOT/installed/x64-windows/lib" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$env:VCPKG_ROOT/installed/x64-windows/include" >> $env:GITHUB_ENV
          echo "ZLIB_INCLUDE_DIR=$env:VCPKG_ROOT/installed/x64-windows/include" >> $env:GITHUB_ENV
          echo "ZLIB_LIB_DIR=$env:VCPKG_ROOT/installed/x64-windows/lib" >> $env:GITHUB_ENV

      - name: Build Web Target
        run: |
          cd web && npm run build
          cp -r web/dist app/dist || true

      - name: Clean Cargo
        run: cd app/src-tauri && cargo clean

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: './app'
          tagName: ${{ github.ref_name }}
          releaseName: 'Sparks Connect ${{ github.ref_name }}'
          releaseBody: 'Download Sparks Connect for your platform below.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}